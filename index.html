<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="description" content="中文 ↔ 泰文 即時語音翻譯，適用於工廠溝通" />
  <title>中泰翻譯</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/icons/icon-192.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Sans+Thai:wght@400;500;700;900&display=swap"
    rel="stylesheet" />
</head>

<body>
  <!-- 角色選擇畫面 -->
  <div id="role-screen" class="screen active">
    <div class="role-header">
      <div class="app-logo">🌏</div>
      <h1>中泰翻譯</h1>
      <p class="subtitle">เลือกบทบาทของคุณ / 選擇你的角色</p>
    </div>
    <div class="role-cards">
      <button class="role-card" data-role="supervisor">
        <div class="role-icon">👔</div>
        <div class="role-label">主管</div>
        <div class="role-desc">中文 → 泰文</div>
      </button>
      <button class="role-card" data-role="worker">
        <div class="role-icon">🏭</div>
        <div class="role-label">พนักงาน</div>
        <div class="role-desc">ไทย → จีน</div>
      </button>
    </div>
    <div class="gender-select">
      <span class="gender-label">語音性別 / เพศเสียง</span>
      <div class="gender-buttons">
        <button class="gender-btn active" data-gender="male">👨 男 / ชาย</button>
        <button class="gender-btn" data-gender="female">👩 女 / หญิง</button>
      </div>
    </div>
    <button id="btn-mic-permission" class="mic-permission-btn" style="display:none">
      🎤 允許使用麥克風 / อนุญาตไมโครโฟน
    </button>
    <button id="btn-history" class="history-btn">
      📋 翻譯紀錄 / ประวัติ
    </button>
    <button id="btn-theme" class="history-btn" style="margin-top:8px">
      ☀️ 切換淺色模式
    </button>
    <button id="btn-sheet-setting" class="history-btn" style="margin-top:8px">
      📊 資料收集設定
    </button>

    <!-- Google Sheets 設定對話框 -->
    <div id="sheet-dialog" class="sheet-dialog" style="display:none">
      <div class="sheet-dialog-content">
        <h3>📊 資料收集設定</h3>
        <p style="font-size:13px;opacity:0.8;margin:8px 0">將翻譯紀錄自動傳送至 Google Sheets，用於後續數據分析。</p>
        <input id="sheet-url-input" type="url" class="text-input-field" placeholder="貼上 Google Apps Script 網址..." style="margin:12px 0" />
        <div style="display:flex;gap:8px">
          <button id="btn-sheet-save" class="history-btn" style="flex:1">💾 儲存</button>
          <button id="btn-sheet-cancel" class="history-btn" style="flex:1">取消</button>
        </div>
        <div id="sheet-status" style="font-size:12px;margin-top:8px;text-align:center"></div>
      </div>
    </div>
  </div>

  <!-- 歷史紀錄畫面 -->
  <div id="history-screen" class="screen">
    <header class="top-bar">
      <button id="btn-history-back" class="icon-btn" aria-label="返回">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 18l-6-6 6-6" />
        </svg>
      </button>
      <div class="mode-label">📋 翻譯紀錄</div>
      <button id="btn-export-history" class="icon-btn" aria-label="匯出" title="匯出 CSV">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3" />
        </svg>
      </button>
      <button id="btn-clear-history" class="icon-btn" aria-label="清除" title="清除所有紀錄">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 6h18M8 6V4h8v2M5 6v14a2 2 0 002 2h10a2 2 0 002-2V6M10 11v6M14 11v6" />
        </svg>
      </button>
    </header>
    <div class="history-search">
      <input id="history-search-input" type="text" placeholder="搜尋紀錄 / ค้นหา..." class="text-input-field" />
    </div>
    <div id="history-list" class="history-list">
      <div class="history-empty">
        <p>📝 還沒有翻譯紀錄</p>
        <p class="placeholder-sub">ยังไม่มีประวัติ</p>
      </div>
    </div>
  </div>

  <!-- 主翻譯畫面 -->
  <div id="translate-screen" class="screen">
    <header class="top-bar">
      <button id="btn-back" class="icon-btn" aria-label="返回">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 18l-6-6 6-6" />
        </svg>
      </button>
      <div id="mode-label" class="mode-label">主管模式 · 中文 → 泰文</div>
      <div style="width:40px"></div>
    </header>

    <!-- 離線提示 -->
    <div id="offline-banner" class="offline-banner" style="display:none">
      ⚡ 網路已斷線，翻譯功能暫時無法使用
    </div>

    <!-- 額度顯示（可收合） -->
    <div id="quota-bar" class="quota-bar collapsed">
      <button id="btn-toggle-quota" class="quota-toggle">
        <span id="quota-summary">📊 250/250</span>
        <span class="quota-toggle-arrow">▼</span>
      </button>
      <div class="quota-details">
        <div class="quota-item">
          <span class="quota-label">每分鐘</span>
          <div class="quota-meter">
            <div id="rpm-fill" class="quota-fill"></div>
          </div>
          <span id="rpm-text" class="quota-value">10/10</span>
        </div>
        <div class="quota-item">
          <span class="quota-label">今日</span>
          <div class="quota-meter">
            <div id="rpd-fill" class="quota-fill"></div>
          </div>
          <span id="rpd-text" class="quota-value">250/250</span>
        </div>
        <div id="quota-cooldown" class="quota-cooldown" style="display:none">
          ⏳ <span id="cooldown-text"></span>
        </div>
        <button id="btn-reset-quota" class="reset-quota-btn" title="重置配額計數">重置計數</button>
      </div>
    </div>

    <!-- 對話歷史 -->
    <div id="chat-area" class="chat-area">
      <div class="chat-placeholder">
        <div class="placeholder-icon">🎤</div>
        <p>按住下方按鈕開始說話，或輸入文字翻譯</p>
        <p class="placeholder-sub">กดปุ่มด้านล่างค้างไว้เพื่อพูด หรือพิมพ์ข้อความ</p>
      </div>
    </div>

    <!-- 常用語快捷 -->
    <div id="quick-phrases" class="quick-phrases" style="display:none">
      <div class="quick-phrases-scroll">
        <!-- Filled by JS based on role -->
      </div>
    </div>

    <!-- 文字輸入 -->
    <div class="text-input-bar">
      <input id="text-input" type="text" class="text-input-field" placeholder="輸入文字翻譯 / พิมพ์ข้อความ..."
        autocomplete="off" />
      <button id="btn-send" class="send-btn" aria-label="送出">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
        </svg>
      </button>
    </div>

    <!-- 錄音按鈕 -->
    <div class="record-area">
      <div id="ripple-container" class="ripple-container">
        <button id="btn-record" class="record-btn" aria-label="錄音">
          <svg class="mic-icon" width="40" height="40" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z" />
            <path
              d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z" />
          </svg>
        </button>
      </div>
      <div id="record-status" class="record-status">按住開始說話</div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
